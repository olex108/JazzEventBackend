<!-- contacts_form.html -->

{% load django_vite %}
{% vite_asset 'src/contacts_form.js' %}

<div class="w-full px-2">
    <div class="mx-auto ml-auto max-w-[480px] rounded-none bg-zinc-50 py-10 px-6 sm:px-10 border border-zink-200">

        <!-- Заголовок в одну строку -->
        <div class="mb-4 flex items-baseline justify-between gap-4">
            <h2 class="text-3xl font-light tracking-tight text-zinc-800 uppercase">ФОРМА</h2>
            <p class="text-xs font-extralight text-zinc-800 tracking-[0.2em] uppercase">обратной связи</p>
        </div>

        <form id="contact-form">
            {% csrf_token %}
            <div class="flex flex-wrap -mx-2">

                <!-- Поле: Имя (Пример плавающего лейбла) -->
                <div class="w-full px-2 mb-4">
                    <div class="relative">
                        <input type="text" name="{{ form.full_name.name }}" id="{{ form.full_name.id_for_label }}"
                               placeholder=" "
                               class="floating-input peer">
                        <label for="{{ form.full_name.id_for_label }}" class="floating-label">
                            {{ form.full_name.label }}
                        </label>
                    </div>
                </div>

                <!-- Поле: Email -->
                <div class="w-full px-2 sm:w-1/2 mb-4">
                    <div class="relative">
                        <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}"
                               placeholder=" "
                               class="floating-input peer">
                        <label for="{{ form.email.id_for_label }}" class="floating-label">
                            {{ form.email.label }}
                        </label>
                    </div>
                </div>

                <!-- Поле: Телефон -->
                <div class="w-full px-2 sm:w-1/2 mb-4">
                    <div class="relative">
                        <input type="tel" name="{{ form.phone.name }}" id="{{ form.phone.id_for_label }}"
                               placeholder=" "
                               class="floating-input peer">
                        <label for="{{ form.phone.id_for_label }}" class="floating-label">
                            {{ form.phone.label }}
                        </label>
                    </div>
                </div>

                <!-- Способ связи (уже компактный) -->
                <div class="w-full px-2 mb-6">
                    <div class="grid grid-cols-4 gap-2">
                        {% for radio in form.communication %}
                            <label class="relative flex flex-col items-center cursor-pointer group">
                                <input type="radio" name="{{ radio.data.name }}" value="{{ radio.data.value }}" class="peer sr-only" {% if radio.data.selected %}checked{% endif %}>
                                <div class="w-full py-2 flex flex-col items-center justify-center border-b border-gray-100 transition-all duration-300 peer-checked:border-pink-800 text-gray-400 peer-checked:text-pink-800">
                                    <div class="text-base">
                                        {% if radio.data.value == "telegram" %}<i class="fab fa-telegram-plane"></i>
                                        {% elif radio.data.value == "WhatsApp" %}<i class="fab fa-whatsapp"></i>
                                        {% elif radio.data.value == "Email" %}<i class="far fa-envelope"></i>
                                        {% elif radio.data.value == "Phone" %}<i class="fas fa-phone-alt"></i>{% endif %}
                                    </div>
                                </div>
                            </label>
                        {% endfor %}
                    </div>
                </div>

                <!-- Поле: Согласие -->
                <div class="w-full px-2 mb-6">
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input type="checkbox" name="{{ form.is_agree.name }}" id="{{ form.is_agree.id_for_label }}"
                                   class="w-4 h-4 text-pink-800 border-gray-300 rounded focus:ring-pink-800 cursor-pointer" required>
                        </div>
                        <label for="{{ form.is_agree.id_for_label }}" class="ml-3 text-xs font-light text-gray-500 leading-tight cursor-pointer uppercase tracking-wider">
                            {{ form.is_agree.label }}
                        </label>
                    </div>
                </div>

                <!-- Поле: Сообщение -->
                <div class="w-full px-2 mb-8">
                    <div class="relative">
                        <textarea name="{{ form.message.name }}" id="{{ form.message.id_for_label }}"
                                  placeholder=" " rows="4"
                                  class="floating-input peer resize-none"></textarea>
                        <label for="{{ form.message.id_for_label }}" class="floating-label">
                            {{ form.message.label }}
                        </label>
                    </div>
                </div>

                <!-- Скрытые поля -->
                <input type="hidden" name="plan_type" id="id_plan_type">
                <input type="hidden" name="lineup_id" id="id_lineup_id">

                <!-- Кнопка -->
                <div class="w-full px-2 flex justify-end">
                    <button type="submit" class="px-10 py-3 text-xs font-medium uppercase tracking-widest text-zinc-50 rounded-full bg-zinc-800 hover:bg-pink-800 transition-all duration-300">
                        Отправить
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-20 opacity-0 transition-all duration-500 pointer-events-none">
    <div class="bg-zinc-50 border-l-4 p-4 shadow-xl flex items-center space-x-3 min-w-[300px]">
        <div id="toast-icon" class="text-xl"></div>
        <div>
            <p id="toast-title" class="font-bold text-sm uppercase tracking-wider"></p>
            <p id="toast-message" class="text-xs text-zinc-800"></p>
        </div>
    </div>
</div>

{% load widget_tweaks %}
{% load static %}

{% load django_vite %}
{% vite_asset 'src/featured_slider.js' %}

<!-- Success Stories / Featured Events Section -->
<section id="featured-events" class="relative z-10 overflow-hidden bg-zinc-800 flex items-center min-h-[600px]">
    <div class="swiper featuredSwiper w-full relative">
        <div class="swiper-wrapper">
            {% for event in featured_events %}
            <div class="swiper-slide relative py-24 text-zinc-50"
                 data-thumb="{% if event.preview %}{{ event.preview.url }}{% else %}{% static 'image/default.png' %}{% endif %}">

                <!-- ФОН (Растянут на весь экран без полей) -->
                <div class="absolute inset-0 -z-10 overflow-hidden">
                    <img src="{% if event.preview %}{{ event.preview.url }}{% else %}{% static 'image/default.png' %}{% endif %}"
                         onerror="this.onerror=null; this.src='{% static 'image/default.png' %}';"
                         class="slide-bg-image w-full h-full object-cover opacity-40" alt="{{ event.title }}">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/20 to-transparent"></div>
                </div>

                <div class="container mx-auto px-4 max-w-screen-2xl">
                    <div class="flex flex-wrap -mx-4 items-center lg:items-stretch">

                        <!-- ЛЕВАЯ ЧАСТЬ -->
                        <div class="w-full px-4 lg:w-[50%] flex flex-col justify-between">
                            <div class="flex flex-col">
                                <span class="text-[14px] uppercase tracking-[0.4em] text-pink-500 block mb-2">— Эксклюзивные проекты</span>

                                <h1 class="text-4xl font-light tracking-tight !leading-[1.1] sm:text-5xl lg:text-6xl mb-2">
                                    {{ event.title }}
                                </h1>

                                <div class="mt-12">
                                    <p class="text-lg font-extralight opacity-90 mb-8 leading-relaxed max-w-[90%]">
                                        {{ event.description|truncatewords:32|safe }}
                                    </p>
                                    <!-- Кнопка -->
                                    <div class="mt-12 flex items-center justify-between w-full lg:max-w-full relative z-50">
                                        <a href="{% url 'content:event_detail' event.id %}" class="featured-btn group inline-flex items-center px-8 py-3 text-sm font-medium rounded-full border border-zinc-50/30 text-zinc-50 transition-all duration-300 hover:bg-pink-800 hover:border-pink-800 hover:text-zinc-50 active:scale-95 uppercase tracking-widest">
                                            Подробнее
                                            <span class="js-scroll-arrow ml-2 inline-block">
                                                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" class="fill-current"><path d="M18 9.5L11.5312 2.9375C11.25 2.65625 10.8125 2.65625 10.5312 2.9375C10.25 3.21875 10.25 3.65625 10.5312 3.9375L15.7812 9.28125H2.5C2.125 9.28125 1.8125 9.59375 1.8125 9.96875C1.8125 10.3437 2.125 10.6875 2.5 10.6875H15.8437L10.5312 16.0938C10.25 16.375 10.25 16.8125 10.5312 17.0938C10.6562 17.2188 10.8437 17.2813 11.0312 17.2813C11.2187 17.2813 11.4062 17.2188 11.5312 17.0625L18 10.5C18.2812 10.2187 18.2812 9.78125 18 9.5Z"></path></svg>
                                            </span>
                                        </a>

                                        <!-- Стрелки навигации (будут работать для всего слайдера) -->
                                        <div class="flex items-center gap-3">
                                            <!-- Назад (с разворотом стрелки) -->
                                            <button class="featured-prev w-12 h-12 rounded-full border border-zinc-50/20 flex items-center justify-center text-zinc-50 hover:bg-pink-600 hover:border-pink-600 transition-all active:scale-90">
                                                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" class="fill-current rotate-180">
                                                    <path d="M18 9.5L11.5312 2.9375C11.25 2.65625 10.8125 2.65625 10.5312 2.9375C10.25 3.21875 10.25 3.65625 10.5312 3.9375L15.7812 9.28125H2.5C2.125 9.28125 1.8125 9.59375 1.8125 9.96875C1.8125 10.3437 2.125 10.6875 2.5 10.6875H15.8437L10.5312 16.0938C10.25 16.375 10.25 16.8125 10.5312 17.0938C10.6562 17.2188 10.8437 17.2813 11.0312 17.2813C11.2187 17.2813 11.4062 17.2188 11.5312 17.0625L18 10.5C18.2812 10.2187 18.2812 9.78125 18 9.5Z"></path>
                                                </svg>
                                            </button>

                                            <!-- Вперед -->
                                            <button class="featured-next w-12 h-12 rounded-full border border-zinc-50/20 flex items-center justify-center text-zinc-50 hover:bg-pink-600 hover:border-pink-600 transition-all active:scale-90">
                                                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" class="fill-current">
                                                    <path d="M18 9.5L11.5312 2.9375C11.25 2.65625 10.8125 2.65625 10.5312 2.9375C10.25 3.21875 10.25 3.65625 10.5312 3.9375L15.7812 9.28125H2.5C2.125 9.28125 1.8125 9.59375 1.8125 9.96875C1.8125 10.3437 2.125 10.6875 2.5 10.6875H15.8437L10.5312 16.0938C10.25 16.375 10.25 16.8125 10.5312 17.0938C10.6562 17.2188 10.8437 17.2813 11.0312 17.2813C11.2187 17.2813 11.4062 17.2188 11.5312 17.0625L18 10.5C18.2812 10.2187 18.2812 9.78125 18 9.5Z"></path>
                                                </svg>
                                            </button>
                                        </div>

                                    </div>

                                </div>
                            </div>
                        </div>

                        <!-- ПРАВАЯ ЧАСТЬ -->
                        <div class="w-full px-4 lg:w-[50%] flex items-center justify-center">
                            <div class="relative w-full max-w-2xl p-1 bg-zinc-50 shadow-2xl">
                                <div class="relative aspect-video bg-zinc-800 overflow-hidden">
                                    <img src="{% if event.preview %}{{ event.preview.url }}{% else %}{% static 'image/default.png' %}{% endif %}"
                                         class="h-full w-full object-cover transition-transform duration-1000 hover:scale-110"
                                         alt="{{ event.title }}">
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<!-- "price_contacts_form.html" -->

<section id="services-section"
         class="relative z-10 py-20 text-zinc-50 bg-pink-900 bg-center bg-no-repeat reveal-fade"
         style="background-image: url('ВАШ_ПУТЬ_К_ИЗОБРАЖЕНИЮ_ИЛИ_{{ django_var }}');"
>

    <!-- Затемнение фона -->
    <div class="absolute top-0 left-0 -z-10 h-full w-full bg-black/40"></div>

    <div class="container mx-auto px-4 max-w-screen-2xl w-full relative z-10">
        <!-- justify-between распределяет лево и право по краям -->
        <div class="flex flex-col md:flex-row items-start justify-between gap-8">

            <!-- Левая часть: Занимает 40% ширины -->
            <div class="w-full md:w-[40%]">
                <h2 class="text-4xl font-light tracking-tight lg:text-5xl !leading-[1.1]">
                    Сделай первый шаг
                </h2>
            </div>

            <!-- Правая часть: Занимает 60% ширины, выравнивание контента вправо -->
            <div class="w-full md:w-[60%] flex flex-col items-end text-right">

                <!-- Описание: увеличили max-w, чтобы текст не был слишком узким столбиком -->
                <p class="text-gray-300 text-xl font-extralight leading-relaxed mb-10">
                    Заполните форму обратной связи, укажите информацию о времени и место проведения мероприятия (информацию о составе и пакете указывать не нужно), мы с Вами свяжемся в ближайшее время
                </p>

                <!-- Кнопка -->
                <button onclick="toggleContactForm()" class="btn group inline-flex items-center px-10 py-4 text-sm font-medium rounded-full border border-gray-500 text-zinc-50 transition-all duration-300 hover:bg-zinc-50 hover:text-zinc-800 active:scale-95 uppercase tracking-widest">
                    <span>Заполнить форму</span>
                    <svg class="ml-3 transform transition-transform duration-300 group-hover:translate-x-1 fill-current" width="18" height="18" viewBox="0 0 20 20">
                        <path d="M18 9.5L11.5312 2.9375C11.25 2.65625 10.8125 2.65625 10.5312 2.9375C10.25 3.21875 10.25 3.65625 10.5312 3.9375L15.7812 9.28125H2.5C2.125 9.28125 1.8125 9.59375 1.8125 9.96875C1.8125 10.3437 2.125 10.6875 2.5 10.6875H15.8437L10.5312 16.0938C10.25 16.375 10.25 16.8125 10.5312 17.0938C10.6562 17.2188 10.8437 17.2813 11.0312 17.2813C11.2187 17.2188 11.4062 17.2188 11.5312 17.0625L18 10.5C18.2812 10.2187 18.2812 9.78125 18 9.5Z"></path>
                    </svg>
                </button>

                <!-- Контейнер формы -->
                <div id="contact-form-container" class="w-full py-10 hidden opacity-0 translate-y-4 transition-all duration-700 ease-out reveal">
                    <div class="w-full text-left">
                        {% include 'content/includes/contacts_form.html' %}
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

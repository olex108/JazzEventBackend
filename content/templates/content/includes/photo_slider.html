{% load thumbnail %} <!-- Добавьте это в начало файла -->
{% load static %}

{% load django_vite %}
{% vite_asset 'src/photo_slider.js' %}

<div class="container mx-auto max-w-screen-2xl relative">
    <div class="swiper photoSwiper !overflow-hidden">
        <div class="swiper-wrapper !overflow-visible py-10">
            {% for photo in photo_list %}
                <div class="swiper-slide aspect-square group cursor-pointer z-10 hover:z-[70] transition-all duration-300">
                    {% thumbnail photo.image "500x500" crop="center" quality=85 as im %}
                        <img src="{{ im.url }}"
                             alt="Photo"
                             loading="lazy"
                             onclick="openLightbox('{{ photo.image.url }}')"
                             class="w-full h-full object-cover transition-transform duration-300 ease-out will-change-transform transform-gpu group-hover:scale-[1.2] border-none">
                    {% empty %}
                        <div class="w-full h-full bg-zinc-700 flex items-center justify-center">
                            <span class="text-zinc-500 text-[8px]">Ошибка</span>
                        </div>
                    {% endthumbnail %}
                </div>
            {% endfor %}
        </div>
    </div>

    <!-- Кнопки навигации -->

    <div class="flex mx-auto max-w-screen-xl justify-between px-8 pb-24 items-center reveal-fade">
        <!-- Кнопка НАЗАД (Указатель слева, хвост растет ВПРАВО) -->
        <button class="photo-prev group relative flex items-center text-zinc-800 transition-opacity hover:opacity-80">
            <svg width="60" height="12" viewBox="0 0 60 12" fill="none" xmlns="http://www.w3.org" class="overflow-visible">
                <!-- НАКОНЕЧНИК (НЕПОДВИЖНЫЙ) -->
                <path d="M6 1L1 6L6 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- ЛИНИЯ (ХВОСТ) - растет ВПРАВО за счет origin-left -->
                <line x1="2" y1="6" x2="30" y2="6" stroke="currentColor" stroke-width="1.5"
                      class="transition-transform duration-300 ease-in-out origin-left group-hover:scale-x-[1.5]" />
            </svg>
        </button>

        <!-- Кнопка ВПЕРЕД (Указатель справа, хвост растет ВЛЕВО) -->
        <button class="photo-next group relative flex items-center text-zinc-800 transition-opacity hover:opacity-80">
            <svg width="60" height="12" viewBox="0 0 60 12" fill="none" xmlns="http://www.w3.org" class="overflow-visible">
                <!-- ЛИНИЯ (ХВОСТ) - растет ВЛЕВО за счет origin-right -->
                <line x1="30" y1="6" x2="58" y2="6" stroke="currentColor" stroke-width="1.5"
                      class="transition-transform duration-300 ease-in-out origin-right group-hover:scale-x-[1.5]" />
                <!-- НАКОНЕЧНИК (НЕПОДВИЖНЫЙ) -->
                <path d="M54 1L59 6L54 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

</div>


<!-- Простейший Lightbox для клика (разворот на весь экран) -->
<div id="lightbox" class="fixed inset-0 z-[100] hidden bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
    <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain shadow-2xl transition-transform duration-500">
</div>

<!-- "slider_line_up_section.html" -->

<!-- СЕКЦИЯ СО СЛАЙДЕРОМ -->
<div class="bg-zinc-50 py-16 overflow-hidden">
    <div class="mx-auto max-w-screen-2xl px-4">
        <!-- Заголовок слайдера -->
        <div class="mb-16 flex flex-col md:flex-row md:items-end md:justify-between gap-8">
            <div class="md:w-1/2">
                <h2 class="text-4xl font-light tracking-tight text-zinc-800 lg:text-5xl">
                    Наши составы
                </h2>
            </div>
            <div class="md:w-1/2 flex flex-col items-start md:items-end gap-6">
                <p class="text-zinc-800 text-lg md:text-right font-extralight leading-relaxed">
                    Мы подберем лучший состав, учитывая Ваши пожелания, формат мероприятия, а также технические возможности площадки
                </p>
                <a href="{% url 'content:line_up' %}" class="group inline-flex items-center px-8 py-3 text-sm font-medium rounded-full border bg-zinc-800 border-zinc-800/30 text-zinc-50 transition-all duration-300 hover:bg-pink-800 hover:text-zinc-50 active:scale-95 uppercase tracking-widest">
                    Подобрать состав
                    <span class="js-scroll-arrow ml-2 inline-block">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="fill-current">
                            <path d="M18 9.5L11.5312 2.9375C11.25 2.65625 10.8125 2.65625 10.5312 2.9375C10.25 3.21875 10.25 3.65625 10.5312 3.9375L15.7812 9.28125H2.5C2.125 9.28125 1.8125 9.59375 1.8125 9.96875C1.8125 10.3437 2.125 10.6875 2.5 10.6875H15.8437L10.5312 16.0938C10.25 16.375 10.25 16.8125 10.5312 17.0938C10.6562 17.2188 10.8437 17.2813 11.0312 17.2813C11.2187 17.2813 11.4062 17.2188 11.5312 17.0625L18 10.5C18.2812 10.2187 18.2812 9.78125 18 9.5Z"></path>
                        </svg>
                    </span>
                </a>
            </div>
        </div>

        <!-- Слайдер -->
        <div class="relative group/slider">
            <div class="my-swiper-container swiper overflow-hidden reveal">
                <div class="swiper-wrapper">
                    {% for line_up in line_up_list %}
                        <div class="swiper-slide">
                            <div class="group flex flex-col h-full bg-transparent transition-all duration-300">
                                <div class="relative aspect-video overflow-hidden">
                                    <img src="{{ line_up.image.url }}" alt="{{ image.title }}" class="object-cover w-full h-full transform group-hover:scale-105 transition-transform duration-700">
                                </div>
                                <div class="pt-4 text-left">
                                    <h3 class="text-xl font-light text-zinc-800 group-hover:text-zinc-800 transition-colors">
                                        {{ line_up.title }}
                                        {% if line_up.is_vocal %}
                                            <span class="ml-2 text-base font-extralight text-zinc-600">c вокалом</span>
                                        {% endif %}
                                    </h3>
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>

            <!-- Стрелки -->
            <!-- Контейнер стрелок -->
            <div class="flex justify-between items-center reveal-fade">
                <!-- Кнопка НАЗАД (Указатель слева, хвост растет ВПРАВО) -->
                <button class="swiper-button-prev-custom group relative flex items-center text-zinc-800 transition-opacity hover:opacity-80">
                    <svg width="60" height="12" viewBox="0 0 60 12" fill="none" xmlns="http://www.w3.org" class="overflow-visible">
                        <!-- НАКОНЕЧНИК (НЕПОДВИЖНЫЙ) -->
                        <path d="M6 1L1 6L6 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- ЛИНИЯ (ХВОСТ) - растет ВПРАВО за счет origin-left -->
                        <line x1="2" y1="6" x2="30" y2="6" stroke="currentColor" stroke-width="1.5"
                              class="transition-transform duration-300 ease-in-out origin-left group-hover:scale-x-[1.5]" />
                    </svg>
                </button>

                <!-- Кнопка ВПЕРЕД (Указатель справа, хвост растет ВЛЕВО) -->
                <button class="swiper-button-next-custom group relative flex items-center text-zinc-800 transition-opacity hover:opacity-80">
                    <svg width="60" height="12" viewBox="0 0 60 12" fill="none" xmlns="http://www.w3.org" class="overflow-visible">
                        <!-- ЛИНИЯ (ХВОСТ) - растет ВЛЕВО за счет origin-right -->
                        <line x1="30" y1="6" x2="58" y2="6" stroke="currentColor" stroke-width="1.5"
                              class="transition-transform duration-300 ease-in-out origin-right group-hover:scale-x-[1.5]" />
                        <!-- НАКОНЕЧНИК (НЕПОДВИЖНЫЙ) -->
                        <path d="M54 1L59 6L54 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

        </div>
    </div>
</div>

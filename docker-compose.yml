services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    image: olex108/jazz_event:latest
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    expose:
      - "8000"
    volumes:
      # - .:/app
      - static_root:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: olex108/jazz_event-nginx:latest
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - static_root:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_root:
  media_volume:
